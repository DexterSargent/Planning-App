services:
  api:
    build: .
    volumes:
      - ./data:/data
      - ./backend/src:/app/src
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=/data/performance_hq.db
      - PYTHONPATH=/app/src

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - api
    environment:
      - REACT_APP_API_URL=http://api:8000
